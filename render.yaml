services:
  # Web uygulaması servisi
  - type: web
    name: kolaycms
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_APP
        value: wsgi.py
      - key: FLASK_DEBUG
        value: 0 