{% extends 'admin/master.html' %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col">
            <h2>{{ page.title }}</h2>
        </div>
        <div class="col text-end">
            <a href="{{ url_for('admin.pages_list') }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Geri Dön
            </a>
            <a href="{{ url_for('admin.pages_edit', id=page.id) }}" class="btn btn-primary">
                <i class="fas fa-edit"></i> Düzenle
            </a>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="mb-3">
                <strong>SEO URL:</strong> {{ page.slug }}
            </div>
            
            <div class="mb-3">
                <strong>Durum:</strong>
                {% if page.is_published %}
                <span class="badge bg-success">Yayında</span>
                {% else %}
                <span class="badge bg-warning">Taslak</span>
                {% endif %}
            </div>
            
            <div class="mb-3">
                <strong>Oluşturulma Tarihi:</strong> {{ page.created_at.strftime('%d.%m.%Y %H:%M') }}
            </div>
            
            <hr>
            
            <div class="page-content">
                {{ page.content|safe }}
            </div>
        </div>
    </div>
</div>
{% endblock %}
