{% extends "admin/master.html" %}

{% block content %}
<div class="container-fluid px-4">
    <h1 class="mt-4">Yeni Slayt Ekle</h1>
    
    <div class="card mb-4">
        <div class="card-header">
            <i class="fas fa-plus me-1"></i>
            Slayt Bilgileri
        </div>
        <div class="card-body">
            <form method="POST" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="row">
                    <div class="col-md-8">
                        <!-- Temel Bilgiler -->
                        <div class="mb-3">
                            <label for="title" class="form-label">Başlık</label>
                            <input type="text" class="form-control" id="title" name="title" 
                                   placeholder="Örnek: İş Dünyasında Pazarlama Çözümleri" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="description" class="form-label">Açıklama</label>
                            <textarea class="form-control" id="description" name="description" rows="3"
                                    placeholder="Örnek: Profesyonel ekibimizle işletmenizin pazarlama süreçlerini yönetiyoruz"></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="button_text" class="form-label">Buton Metni</label>
                            <input type="text" class="form-control" id="button_text" name="button_text" 
                                   placeholder="Örnek: Daha Fazla Bilgi">
                        </div>
                        
                        <div class="mb-3">
                            <label for="button_url" class="form-label">Buton URL</label>
                            <input type="text" class="form-control" id="button_url" name="button_url" 
                                   placeholder="Örnek: /hakkimizda">
                        </div>
                    </div>
                    
                    <div class="col-md-4">
                        <!-- Yan Panel -->
                        <div class="card">
                            <div class="card-header">
                                Ayarlar
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label for="order" class="form-label">Sıralama</label>
                                    <input type="number" class="form-control" id="order" name="order" value="0" min="0">
                                    <div class="form-text">Küçük sayılar önce gösterilir</div>
                                </div>
                                
                                <div class="mb-3">
                                    <label for="image" class="form-label">Slayt Görseli</label>
                                    <input type="file" class="form-control" id="image" name="image" accept="image/*" required>
                                    <div class="form-text">
                                        Önerilen boyut: 1920x800px<br>
                                        Maksimum dosya boyutu: 2MB
                                    </div>
                                </div>
                                
                                <div class="mb-3">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="is_active" name="is_active" checked>
                                        <label class="form-check-label" for="is_active">Aktif</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-1"></i> Kaydet
                    </button>
                    <a href="{{ url_for('admin.contents_list') }}" class="btn btn-secondary">
                        <i class="fas fa-times me-1"></i> İptal
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
