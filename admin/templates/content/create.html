{% extends 'admin/base.html' %}

{% block title %}Yeni İçerik Ekle{% endblock %}

{% block breadcrumb %}
<li class="breadcrumb-item"><a href="{{ url_for('admin_contents.index') }}">İçerikler</a></li>
<li class="breadcrumb-item active">Yeni İçerik Ekle</li>
{% endblock %}

{% block body %}
<div class="card">
    <div class="card-header">
        <h5 class="mb-0">Yeni İçerik Ekle</h5>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="form-group">
                <label for="content_type">İçerik Tipi</label>
                <select name="content_type" id="content_type" class="form-control" required>
                    <option value="">Seçiniz...</option>
                    <option value="blog">Blog Yazısı</option>
                    <option value="slide">Slayt</option>
                    <option value="service">Hizmet</option>
                    <option value="about">Hakkımızda</option>
                    <option value="video">Video</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="title">Başlık</label>
                <input type="text" class="form-control" id="title" name="title" required>
            </div>
            
            <div class="form-group">
                <label for="content">İçerik</label>
                <textarea class="form-control" id="content" name="content" rows="10" required></textarea>
                <small class="form-text text-muted content-help"></small>
            </div>
            
            <div class="form-group">
                <button type="submit" class="btn btn-primary">Kaydet</button>
                <a href="{{ url_for('admin_contents.index') }}" class="btn btn-secondary">İptal</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(document).ready(function() {
    const contentType = $('#content_type');
    const contentHelp = $('.content-help');
    
    contentType.change(function() {
        const type = $(this).val();
        
        switch(type) {
            case 'blog':
                contentHelp.text('Blog yazısının içeriğini giriniz...');
                break;
            case 'slide':
                contentHelp.text('Slayt açıklamasını giriniz...');
                break;
            case 'service':
                contentHelp.text('Hizmet açıklamasını giriniz...');
                break;
            case 'about':
                contentHelp.text('Hakkımızda bölümü içeriğini giriniz...');
                break;
            case 'video':
                contentHelp.text('Video URL\'sini giriniz...');
                break;
            default:
                contentHelp.text('');
        }
    });
});
</script>
{% endblock %}
