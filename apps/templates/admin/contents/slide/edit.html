{% extends 'admin/base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Slayt Düzenle</h3>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('admin.slide_edit', id=slide.id) }}" method="POST" enctype="multipart/form-data">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        
                        <div class="form-group">
                            <label for="title">Başlık</label>
                            <input type="text" class="form-control" id="title" name="title" value="{{ slide.title }}" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="description">Açıklama</label>
                            <textarea class="form-control" id="description" name="description" rows="3">{{ slide.description }}</textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="button_text">Buton Metni</label>
                            <input type="text" class="form-control" id="button_text" name="button_text" value="{{ slide.button_text }}">
                        </div>
                        
                        <div class="form-group">
                            <label for="button_url">Buton URL</label>
                            <input type="text" class="form-control" id="button_url" name="button_url" value="{{ slide.button_url }}">
                        </div>
                        
                        <div class="form-group">
                            <label for="order">Sıralama</label>
                            <input type="number" class="form-control" id="order" name="order" value="{{ slide.order }}" min="0">
                        </div>
                        
                        <div class="form-group">
                            <div class="custom-control custom-switch">
                                <input type="checkbox" class="custom-control-input" id="is_active" name="is_active" {% if slide.is_active %}checked{% endif %}>
                                <label class="custom-control-label" for="is_active">Aktif</label>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="image">Görsel</label>
                            {% if slide.image_path %}
                            <div class="mb-2">
                                <img src="{{ slide.image_path }}" alt="Mevcut görsel" style="max-width: 200px;">
                            </div>
                            {% endif %}
                            <input type="file" class="form-control-file" id="image" name="image" accept="image/*">
                            <small class="form-text text-muted">Önerilen boyut: 1920x800 piksel</small>
                        </div>
                        
                        <div class="text-end mt-3">
                            <a href="{{ url_for('admin.content_pages_list') }}" class="btn btn-secondary">İptal</a>
                            <button type="submit" class="btn btn-primary">Değişiklikleri Kaydet</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
