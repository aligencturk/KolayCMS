{% extends "admin/master.html" %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Sayfa Düzenle</h3>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="form-group">
                            <label for="title">Başlık</label>
                            <input type="text" class="form-control" id="title" name="title" value="{{ page.title }}" required>
                        </div>
                        <div class="form-group">
                            <label for="slug">Slug</label>
                            <input type="text" class="form-control" id="slug" name="slug" value="{{ page.slug }}" required>
                        </div>
                        <div class="form-group">
                            <label for="content">İçerik</label>
                            <textarea class="form-control" id="content" name="content" rows="10">{{ page.content }}</textarea>
                        </div>
                        <div class="form-group">
                            <label for="meta_description">Meta Açıklama</label>
                            <input type="text" class="form-control" id="meta_description" name="meta_description" value="{{ page.meta_description }}">
                        </div>
                        <div class="form-group">
                            <label for="meta_keywords">Meta Anahtar Kelimeler</label>
                            <input type="text" class="form-control" id="meta_keywords" name="meta_keywords" value="{{ page.meta_keywords }}">
                        </div>
                        <div class="form-check mb-3">
                            <input type="checkbox" class="form-check-input" id="is_published" name="is_published" {% if page.is_published %}checked{% endif %}>
                            <label class="form-check-label" for="is_published">Yayınla</label>
                        </div>

                        {% if page.slug == 'contact' %}
                        <hr>
                        <h4>İletişim Bilgileri</h4>
                        <div class="form-group">
                            <label for="address">Adres</label>
                            <input type="text" class="form-control" id="address" name="address" value="{{ page.contact_info.address if page.contact_info else '' }}">
                        </div>
                        <div class="form-group">
                            <label for="phone">Telefon</label>
                            <input type="text" class="form-control" id="phone" name="phone" value="{{ page.contact_info.phone if page.contact_info else '' }}">
                        </div>
                        <div class="form-group">
                            <label for="email">E-posta</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ page.contact_info.email if page.contact_info else '' }}">
                        </div>
                        <div class="form-group">
                            <label for="working_hours">Çalışma Saatleri</label>
                            <input type="text" class="form-control" id="working_hours" name="working_hours" value="{{ page.contact_info.working_hours if page.contact_info else '' }}">
                        </div>
                        <div class="form-group">
                            <label for="google_maps_embed">Google Maps Embed Kodu</label>
                            <textarea class="form-control" id="google_maps_embed" name="google_maps_embed" rows="3">{{ page.contact_info.google_maps_embed if page.contact_info else '' }}</textarea>
                        </div>
                        <hr>
                        <h4>Sosyal Medya</h4>
                        <div class="form-group">
                            <label for="facebook">Facebook</label>
                            <input type="url" class="form-control" id="facebook" name="facebook" value="{{ page.contact_info.facebook if page.contact_info else '' }}">
                        </div>
                        <div class="form-group">
                            <label for="twitter">Twitter</label>
                            <input type="url" class="form-control" id="twitter" name="twitter" value="{{ page.contact_info.twitter if page.contact_info else '' }}">
                        </div>
                        <div class="form-group">
                            <label for="instagram">Instagram</label>
                            <input type="url" class="form-control" id="instagram" name="instagram" value="{{ page.contact_info.instagram if page.contact_info else '' }}">
                        </div>
                        <div class="form-group">
                            <label for="linkedin">LinkedIn</label>
                            <input type="url" class="form-control" id="linkedin" name="linkedin" value="{{ page.contact_info.linkedin if page.contact_info else '' }}">
                        </div>
                        {% endif %}

                        <button type="submit" class="btn btn-primary">Kaydet</button>
                        <a href="{{ url_for('admin.content_pages_list') }}" class="btn btn-secondary">İptal</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
