<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - KolayCMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f5f5f5;
        }
        .login-form {
            width: 100%;
            max-width: 400px;
            padding: 15px;
            margin: auto;
        }
        .login-form .form-control {
            position: relative;
            box-sizing: border-box;
            height: auto;
            padding: 10px;
            font-size: 16px;
        }
        .login-form .form-control:focus {
            z-index: 2;
        }
        .login-form input[type="text"] {
            margin-bottom: -1px;
            border-bottom-right-radius: 0;
            border-bottom-left-radius: 0;
        }
        .login-form input[type="password"] {
            margin-bottom: 10px;
            border-top-left-radius: 0;
            border-top-right-radius: 0;
        }
    </style>
</head>
<body>
    <div class="login-form text-center">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <h2 class="mb-4 text-primary">KolayCMS</h2>
            <h1 class="h3 mb-3 font-weight-normal">Giriş Yap</h1>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            
            <div class="form-group mb-3">
                <input type="text" name="username" class="form-control" placeholder="Kullanıcı Adı" required autofocus>
            </div>
            <div class="form-group mb-3">
                <input type="password" name="password" class="form-control" placeholder="Şifre" required>
            </div>
            <button class="btn btn-lg btn-primary btn-block w-100" type="submit">Giriş Yap</button>
            
            <div class="mt-3">
                <a href="{{ url_for('admin.index') }}" class="btn btn-sm btn-outline-secondary">Admin Paneli</a>
            </div>
            
            <p class="mt-5 mb-3 text-muted">&copy; 2024 KolayCMS</p>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
